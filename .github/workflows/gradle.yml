# This workflow uses actions that are not certified by GitHub.

name: Java CI with Gradle

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # - cron: '*/5 * * * *'   # Run every 5 minutes a day
    - cron: '0 */12 * * *'   # Run every 12 hours from start time

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Run Gradle Build
        run: ./gradlew clean build
      
      - name: Run TestNG Suite
        run: ./gradlew clean test -Psuitename=regression.xml

      - name: Upload Extent Report
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: reports/
      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_EMAIL }}
          password: ${{ secrets.SMTP_PASSWORD }}

          subject: ❌ Automation Test Failed
          body: |
            Your automation test has FAILED ❌

            Repo: ${{ github.repository }}
            Branch: ${{ github.ref_name }}

            Run Details:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please find attached Extent Report.

          to: ${{ secrets.TO_EMAIL }}
          from: ${{ secrets.SMTP_EMAIL }}

          attachments: reports/ExtentReport.html

      - name: Send Email on Success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_EMAIL }}
          password: ${{ secrets.SMTP_PASSWORD }}

          subject: ✅ Automation Test Passed
          body: |
            Your automation test has PASSED ✅

            Repo: ${{ github.repository }}
            Branch: ${{ github.ref_name }}

            Run Details:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please find attached Extent Report.

          to: ${{ secrets.TO_EMAIL }}
          from: ${{ secrets.SMTP_EMAIL }}

          attachments: reports/ExtentReport.html



    # Generates and submits a dependency graph, enabling Dependabot Alerts for all project dependencies.



